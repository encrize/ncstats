name: Collect Neocities stats

on:
  schedule:
    # Runs every day at 23:30 UTC. Cron is in UTC; adjust if you like.
    - cron: "30 23 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write          # needed to commit the updated stats.json

concurrency:
  group: neocities-stats
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch stats
        env:
          NEOCITIES_SITENAME: ${{ vars.NEOCITIES_SITENAME }}
          NEOCITIES_API_KEY: ${{ secrets.NEOCITIES_API_KEY }}
        run: python fetch_stats.py

      - name: Commit snapshot
        run: |
          git config user.name  "neocities-stats-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/stats.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "stats: snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
